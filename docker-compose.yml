services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: valekapimda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
volumes:
  pgdata:
